<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisanAI Dashboard Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            width: 80%;
            max-width: 600px;
            margin: 20px auto;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8em;
        }

        .separator {
            height: 3px;
            background-color: #ecf0f1;
            margin: 0;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid #ecf0f1;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .field {
            margin-bottom: 15px;
        }

        .field-label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .field-value {
            background-color: #ecf0f1;
            padding: 8px 12px;
            border-radius: 4px;
            min-height: 24px;
            display: flex;
            align-items: center;
        }

        .progress-bar {
            background-color: #ecf0f1;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background-color: #27ae60;
            width: 82%;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .progress-container {
            position: relative;
        }

        .water-stress {
            background-color: #f39c12;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .recommendation-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }

        .recommendation-item::before {
            content: "✓";
            color: #27ae60;
            margin-right: 8px;
            font-weight: bold;
        }

        .map-placeholder {
            background-color: #ecf0f1;
            height: 150px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            font-style: italic;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .container {
                width: 95%;
                margin: 10px auto;
            }

            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>KISAN AI</h1>
        </div>
        <div class="separator"></div>

        <div class="section">
            <div class="field">
                <div class="field-label">Location</div>
                <div class="field-value">[ Punjab ]</div>
            </div>
            <div class="field">
                <div class="field-label">Crop</div>
                <div class="field-value">[ Wheat ]</div>
            </div>
        </div>
        <div class="separator"></div>

        <div class="section">
            <div class="section-title">Crop Health</div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="progress-text">82%</div>
            </div>
        </div>
        <div class="separator"></div>

        <div class="section">
            <div class="section-title">Water Stress</div>
            <div class="field-value water-stress">MEDIUM</div>
        </div>
        <div class="separator"></div>

        <div class="section">
            <div class="section-title">Weather</div>
            <div class="field">
                <div class="field-label">Rainfall Next 7 Days</div>
                <div class="field-value">18 mm</div>
            </div>
        </div>
        <div class="separator"></div>

        <div class="section">
            <div class="section-title">Recommendation</div>
            <div class="recommendation-item">
                Irrigate after 2 days
            </div>
            <div class="recommendation-item">
                Nitrogen application advised
            </div>
        </div>
        <div class="separator"></div>

        <div class="section">
            <div class="section-title">Satellite Map</div>
            <div class="map-placeholder">[ NDVI Map ]</div>
        </div>
        <div class="separator"></div>
    </div>
</body>
</html>
